name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v4.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Restore meson builddir
        id: meson-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            builddir/build.ninja
            builddir/meson-private/
            builddir/meson-info/
          key: meson-builddir-${{ runner.os }}-${{ github.sha }}-${{ hashFiles('meson.build') }}

      - name: Setup meson
        if: steps.meson-cache.outputs.cache-hit != 'true'
        run: uv run meson setup builddir

      - name: Run tests
        run: uv run ninja -C builddir pytest-junit-unit.xml

      - name: Upload test + coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            builddir/pytest-junit-unit.xml
            builddir/pytest-unit.log
            builddir/coverage/coverage-unit.xml
          retention-days: 14
