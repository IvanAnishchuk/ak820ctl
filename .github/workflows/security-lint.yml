name: Security lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: security-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-lint:
    name: Security lint (S rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Restore meson builddir
        id: meson-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            builddir/build.ninja
            builddir/meson-private/
            builddir/meson-info/
          key: meson-builddir-${{ runner.os }}-${{ github.sha }}-${{ hashFiles('meson.build') }}

      - name: Setup meson
        if: steps.meson-cache.outputs.cache-hit != 'true'
        run: uv run meson setup builddir

      - name: Run security lint
        run: uv run ninja -C builddir ruff-security.txt
        continue-on-error: true

      - name: Upload security SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3.27.5
        with:
          sarif_file: builddir/ruff-security.sarif.json
          category: ruff-security
        continue-on-error: true

      - name: Upload security lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-lint-reports
          path: builddir/ruff-security.*
          retention-days: 30
