name: Security lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: security-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-lint:
    name: Security lint (S rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Restore meson builddir
        id: meson-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            builddir/build.ninja
            builddir/meson-private/
            builddir/meson-info/
          key: meson-builddir-${{ runner.os }}-${{ github.sha }}-${{ hashFiles('meson.build') }}

      - name: Setup meson
        if: steps.meson-cache.outputs.cache-hit != 'true'
        run: uv run meson setup builddir

      - name: Run security lint
        run: uv run ninja -C builddir ruff-security.txt
        continue-on-error: true

      - name: Upload security SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.27.5
        with:
          sarif_file: builddir/ruff-security.sarif.json
          category: ruff-security
        continue-on-error: true

      - name: Upload security lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-lint-reports
          path: builddir/ruff-security.*
          retention-days: 30
