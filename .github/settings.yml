repository:
  name: ak820ctl
  description: A short description of the project
  homepage: https://github.com/IvanAnishchuk/ak820ctl
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  # Merge commits are the default for my projects (preserve commit history);
  # squash is disabled. Flip these per-project if a repo needs a different
  # policy.
  allow_squash_merge: false
  allow_merge_commit: true
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  allow_update_branch: true

  security_and_analysis:
    secret_scanning:
      status: enabled
    secret_scanning_push_protection:
      status: enabled
    dependabot_security_updates:
      status: enabled

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working
  - name: enhancement
    color: a2eeef
    description: New feature or request
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation
  - name: security
    color: b60205
    description: Security-relevant issue or fix
  - name: dependencies
    color: 0366d6
    description: Pull requests that update a dependency file
  - name: good first issue
    color: 7057ff
    description: Good for newcomers
  - name: wontfix
    color: ffffff
    description: This will not be worked on

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - pre-commit
          - Lint & format
          - Security lint (S rules)
          - Type check
          - Dependency audit
          - OSV scan
          - "Test (Python 3.14)"
      enforce_admins: true
      required_linear_history: false  # merge commits are non-linear (merge-commit-only policy)
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
      required_signatures: true
      # Probot Settings requires `restrictions` to be present for branch
      # protection to apply at all. null = no push restrictions (everyone with
      # write access). A non-null object ({users, teams, apps}) restricts who
      # may push, but that form is ORG-only -- on personal-account repos the
      # API rejects it, so null is the only valid value here.
      restrictions: null

environments:
  - name: pypi
    wait_timer: 0
    deployment_branch_policy:
      protected_branches: false
      custom_branch_policies: true
      custom_branches:
        - main
        - "v*.*.*"
  - name: testpypi
    wait_timer: 0
    deployment_branch_policy:
      protected_branches: false
      custom_branch_policies: true
      custom_branches:
        - main
